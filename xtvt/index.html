<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小车 x-t / v-t 图像互动演示</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#64748b;--grid:#e5eaf2;--blue:#2563eb;--orange:#ea580c;--green:#16a34a;--red:#dc2626;--shadow:0 8px 24px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:1450px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.title{font-size:26px;font-weight:900}
.tabs,.buttons,.readouts{display:flex;gap:10px;flex-wrap:wrap}.tab,button{border:0;border-radius:999px;padding:10px 16px;font-size:15px;font-weight:900;cursor:pointer}.tab{background:#e8edf6;color:#334155}.tab.active{background:linear-gradient(135deg,#2563eb,#3b82f6);color:white}
button{background:#111827;color:white;border-radius:10px}.secondary{background:#eef2f7;color:#1f2937}.buttons{margin-bottom:12px}
.readouts{margin-bottom:12px}.readout{background:white;border:1px solid var(--grid);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;min-width:145px}.k{font-size:12px;color:var(--muted);margin-bottom:3px}.v{font-size:20px;font-weight:900}
.main{display:grid;grid-template-columns:1fr 300px;gap:14px}.panel{background:white;border:1px solid var(--grid);border-radius:18px;padding:14px;box-shadow:var(--shadow)}
.card{background:#fbfcfe;border:1px solid #e8edf6;border-radius:16px;padding:10px}.motion{margin-bottom:14px}.ct{display:flex;justify-content:space-between;align-items:center;font-weight:900;margin-bottom:6px}.small{font-size:13px;color:var(--muted);font-weight:600}
canvas{display:block;width:100%;height:auto;border-radius:10px;background:white;touch-action:none}.graphs{display:grid;grid-template-columns:1fr 1fr;gap:14px}.controls{display:flex;align-items:center;gap:10px;margin-top:14px}.time{flex:1;min-width:240px;accent-color:#2563eb}
.params{display:grid;gap:10px}.param{background:#fbfcfe;border:1px solid #e8edf6;border-radius:14px;padding:11px}.ph{display:flex;justify-content:space-between;font-size:14px;font-weight:800;margin-bottom:8px}.ph span:last-child{color:#2563eb}.param input{width:100%;accent-color:#2563eb}.side{font-size:20px;font-weight:900;margin:2px 0 12px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:#475569;margin-top:10px}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
@media(max-width:1100px){.main{grid-template-columns:1fr}.graphs{grid-template-columns:1fr}}@media(max-width:760px){.top{flex-direction:column;align-items:flex-start}.title{font-size:22px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">小车运动：x-t 与 v-t 图像联动</div>
    <div class="tabs">
      <button class="tab active" data-mode="free">自由拖动</button>
      <button class="tab" data-mode="uniform">匀速直线运动</button>
      <button class="tab" data-mode="accel">匀加速直线运动</button>
    </div>
  </div>
  <div class="buttons">
    <button id="playBtn">播放</button>
    <button id="clearBtn" class="secondary">清空图像</button>
    <button id="zeroBtn" class="secondary">小车回到 0 m</button>
  </div>
  <div class="readouts">
    <div class="readout"><div class="k">时间 t</div><div class="v" id="tText">0.00 s</div></div>
    <div class="readout"><div class="k">位置 x</div><div class="v" id="xText">0.0 m</div></div>
    <div class="readout"><div class="k">速度 v</div><div class="v" id="vText">0.00 m/s</div></div>
    <div class="readout"><div class="k">加速度 a</div><div class="v" id="aTextBox">0.00 m/s²</div></div>
  </div>
  <div class="main">
    <div class="panel">
      <div class="card motion">
        <div class="ct"><span>实际运动</span><span class="small" id="hint">拖住小车左右移动</span></div>
        <canvas id="motion" width="1200" height="190"></canvas>
      </div>
      <div class="graphs">
        <div class="card"><div class="ct"><span>x-t 图像</span><span class="small" id="xtHint">实时绘制</span></div><canvas id="xt" width="680" height="460"></canvas></div>
        <div class="card"><div class="ct"><span>v-t 图像</span><span class="small" id="vtHint">实时绘制</span></div><canvas id="vt" width="680" height="460"></canvas></div>
      </div>
      <div class="controls" id="timeControls"><input class="time" id="timeSlider" type="range" min="0" max="10" step="0.02" value="0"></div>
      <div class="legend">
        <div><span class="dot" style="background:#2563eb"></span>x-t</div>
        <div><span class="dot" style="background:#ea580c"></span>v-t</div>
        <div><span class="dot" style="background:#16a34a"></span>v-t 面积</div>
        <div><span class="dot" style="background:#dc2626"></span>当前点</div>
      </div>
    </div>
    <div class="panel" id="paramPanel">
      <div class="side">参数</div>
      <div class="params">
        <div class="param"><div class="ph"><span>初位置 x₀</span><span id="x0Text">0 m</span></div><input id="x0" type="range" min="0" max="50" step="1" value="0"></div>
        <div class="param"><div class="ph"><span>初速度 v₀</span><span id="v0Text">6 m/s</span></div><input id="v0" type="range" min="-10" max="15" step="0.5" value="6"></div>
        <div class="param" id="aParam"><div class="ph"><span>加速度 a</span><span id="aText">1 m/s²</span></div><input id="acc" type="range" min="-3" max="3" step="0.1" value="1"></div>
        <div class="param"><div class="ph"><span>演示时间 T</span><span id="TText">10 s</span></div><input id="T" type="range" min="4" max="20" step="1" value="10"></div>
      </div>
    </div>
  </div>
</div>
<script>
const mc=document.getElementById('motion'), xc=document.getElementById('xt'), vc=document.getElementById('vt');
const mctx=mc.getContext('2d'), xctx=xc.getContext('2d'), vctx=vc.getContext('2d');
const tabs=[...document.querySelectorAll('.tab')], playBtn=document.getElementById('playBtn'), clearBtn=document.getElementById('clearBtn'), zeroBtn=document.getElementById('zeroBtn');
const timeSlider=document.getElementById('timeSlider'), x0=document.getElementById('x0'), v0=document.getElementById('v0'), acc=document.getElementById('acc'), T=document.getElementById('T');
let mode='free', xNow=0, vNow=0, aNow=0, elapsed=0, dragging=false, playing=false, timer=null, raf=null, startMs=0, baseT=0, lastT=null, lastX=null;
let data=[{t:0,x:0,v:0,a:0}];
const XMIN=0, XMAX=100;
function n(e){return Number(e.value)} function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function track(){const pad=72;return{pad,y:96,x1:pad,x2:mc.width-pad,w:mc.width-2*pad}}
function xPix(x){const tr=track();return tr.x1+tr.w*(x-XMIN)/(XMAX-XMIN)}
function pixX(px){const tr=track();return XMIN+clamp((px-tr.x1)/tr.w,0,1)*(XMAX-XMIN)}
function pointerX(e){const r=mc.getBoundingClientRect();return(e.clientX-r.left)*mc.width/r.width}
function demoState(t){const A=mode==='uniform'?0:n(acc);return{t,x:n(x0)+n(v0)*t+.5*A*t*t,v:n(v0)+A*t,a:A}}
function buildDemo(){let arr=[],tt=n(T);for(let i=0;i<=360;i++){arr.push(demoState(tt*i/360))}return arr}
function getData(){return mode==='free'?data:buildDemo()}
function getState(){if(mode==='free')return{t:elapsed,x:xNow,v:vNow,a:aNow};return demoState(n(timeSlider))}
function currentDragTime(){return baseT+(performance.now()-startMs)/1000}
function addSample(t,x){if(lastT===null){data.push({t,x,v:0,a:0});lastT=t;lastX=x;return}const dt=t-lastT;if(dt<.025)return;const raw=(x-lastX)/dt, old=vNow;vNow=.35*raw+.65*vNow;aNow=(vNow-old)/dt;data.push({t,x,v:vNow,a:aNow});lastT=t;lastX=x;if(data.length>3000)data.shift()}
function loop(){if(!dragging)return;elapsed=currentDragTime();addSample(elapsed,xNow);drawAll();raf=requestAnimationFrame(loop)}
mc.addEventListener('pointerdown',e=>{if(mode!=='free')return;stopPlay();dragging=true;mc.setPointerCapture(e.pointerId);startMs=performance.now();baseT=elapsed;lastT=elapsed;lastX=xNow;xNow=pixX(pointerX(e));addSample(elapsed,xNow);raf=requestAnimationFrame(loop);drawAll()});
mc.addEventListener('pointermove',e=>{if(dragging&&mode==='free')xNow=pixX(pointerX(e))});
function endDrag(e){if(!dragging)return;elapsed=currentDragTime();dragging=false;try{mc.releasePointerCapture(e.pointerId)}catch(err){}addSample(elapsed,xNow);vNow=0;aNow=0;data.push({t:elapsed,x:xNow,v:0,a:0});drawAll()}
mc.addEventListener('pointerup',endDrag);mc.addEventListener('pointercancel',endDrag);
function ranges(){const arr=getData();let tMax=mode==='free'?Math.max(5,elapsed*1.08,1):n(T);let xs=arr.map(p=>p.x), vs=arr.map(p=>p.v);let xmin=mode==='free'?0:Math.min(0,...xs), xmax=mode==='free'?100:Math.max(100,...xs);let vmax=Math.max(2,...vs.map(v=>Math.abs(v)))*1.18;return{tMin:0,tMax,xMin:xmin,xMax:xmax,vMin:-vmax,vMax:vmax}}
function ticks(min,max,c=5){let span=max-min;if(span<=0)return[min,max];let raw=span/c,p=Math.pow(10,Math.floor(Math.log10(raw))),s=raw/p;if(s<1.5)s=1;else if(s<3)s=2;else if(s<7)s=5;else s=10;s*=p;let a=[],st=Math.ceil(min/s)*s;for(let v=st;v<=max+1e-9;v+=s)a.push(v);return a}
function mx(t,r,W,L,R){return L+(W-L-R)*(t-r.tMin)/(r.tMax-r.tMin)} function my(v,min,max,H,Tp,B){return H-B-(H-Tp-B)*(v-min)/(max-min)}
function drawGraph(ctx,kind){const W=ctx.canvas.width,H=ctx.canvas.height,L=58,R=20,Tp=24,B=44,r=ranges(),arr=getData(),st=getState(),yMin=kind==='x'?r.xMin:r.vMin,yMax=kind==='x'?r.xMax:r.vMax,color=kind==='x'?'#2563eb':'#ea580c';ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#e5eaf2';ctx.lineWidth=1;ctx.beginPath();for(const t of ticks(0,r.tMax,6)){let x=mx(t,r,W,L,R);ctx.moveTo(x,Tp);ctx.lineTo(x,H-B)}for(const yy of ticks(yMin,yMax,6)){let y=my(yy,yMin,yMax,H,Tp,B);ctx.moveTo(L,y);ctx.lineTo(W-R,y)}ctx.stroke();ctx.strokeStyle='#334155';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(L,Tp);ctx.lineTo(L,H-B);ctx.lineTo(W-R,H-B);ctx.stroke();if(kind==='v'){let y0=my(0,yMin,yMax,H,Tp,B);ctx.strokeStyle='#94a3b8';ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(L,y0);ctx.lineTo(W-R,y0);ctx.stroke();ctx.setLineDash([])}ctx.fillStyle='#475569';ctx.font='13px sans-serif';ctx.textAlign='center';for(const t of ticks(0,r.tMax,6)){ctx.fillText(Number(t.toFixed(1)),mx(t,r,W,L,R),H-B+20)}ctx.textAlign='right';for(const yy of ticks(yMin,yMax,6)){ctx.fillText(Number(yy.toFixed(1)),L-8,my(yy,yMin,yMax,H,Tp,B)+4)}ctx.save();ctx.fillStyle='#0f172a';ctx.font='15px sans-serif';ctx.textAlign='center';ctx.fillText('t / s',(W+L-R)/2,H-12);ctx.translate(16,(H+Tp-B)/2);ctx.rotate(-Math.PI/2);ctx.fillText(kind==='x'?'x / m':'v / (m/s)',0,0);ctx.restore();if(kind==='v'&&arr.length>1){let y0=my(0,yMin,yMax,H,Tp,B);ctx.beginPath();ctx.moveTo(mx(arr[0].t,r,W,L,R),y0);for(const p of arr){if(mode!=='free'&&p.t>st.t)break;ctx.lineTo(mx(p.t,r,W,L,R),my(p.v,yMin,yMax,H,Tp,B))}ctx.lineTo(mx(st.t,r,W,L,R),y0);ctx.closePath();ctx.fillStyle='rgba(22,163,74,.16)';ctx.fill()}ctx.beginPath();arr.forEach((p,i)=>{const gx=mx(p.t,r,W,L,R), gy=my(kind==='x'?p.x:p.v,yMin,yMax,H,Tp,B);if(i===0)ctx.moveTo(gx,gy);else ctx.lineTo(gx,gy)});ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();const gx=mx(st.t,r,W,L,R), gy=my(kind==='x'?st.x:st.v,yMin,yMax,H,Tp,B);ctx.fillStyle='#dc2626';ctx.beginPath();ctx.arc(gx,gy,6,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#111827';ctx.lineWidth=1.5;ctx.setLineDash([7,5]);ctx.beginPath();ctx.moveTo(gx,Tp);ctx.lineTo(gx,H-B);ctx.stroke();ctx.setLineDash([])}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function drawMotion(){const ctx=mctx,W=mc.width,H=mc.height,tr=track(),st=getState();if(mode!=='free'){xNow=clamp(st.x,XMIN,XMAX);vNow=st.v;aNow=st.a;elapsed=st.t}ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#94a3b8';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(tr.x1,tr.y);ctx.lineTo(tr.x2,tr.y);ctx.stroke();ctx.fillStyle='#475569';ctx.font='15px sans-serif';ctx.textAlign='center';for(let x=0;x<=100;x+=20){let px=xPix(x);ctx.strokeStyle='#cbd5e1';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,tr.y-11);ctx.lineTo(px,tr.y+11);ctx.stroke();ctx.fillText(`${x} m`,px,tr.y+38)}const carX=xPix(clamp(st.x,XMIN,XMAX)), sign=st.v>=0?1:-1;if(Math.abs(st.v)>.05){let len=Math.min(170,Math.max(35,Math.abs(st.v)*7));ctx.strokeStyle='#ea580c';ctx.fillStyle='#ea580c';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(carX,tr.y-46);ctx.lineTo(carX+sign*len,tr.y-46);ctx.stroke();let hx=carX+sign*len;ctx.beginPath();ctx.moveTo(hx,tr.y-46);ctx.lineTo(hx-sign*15,tr.y-55);ctx.lineTo(hx-sign*15,tr.y-37);ctx.closePath();ctx.fill()}ctx.save();ctx.translate(carX,tr.y);if(sign<0)ctx.scale(-1,1);ctx.fillStyle='#2563eb';ctx.strokeStyle='#0f172a';ctx.lineWidth=2;rr(ctx,-34,-20,68,34,9);ctx.fill();ctx.stroke();ctx.fillStyle='#bfdbfe';rr(ctx,2,-15,24,21,5);ctx.fill();ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(-20,17,7,0,Math.PI*2);ctx.arc(20,17,7,0,Math.PI*2);ctx.fill();if(mode==='free'){ctx.fillStyle='#dc2626';ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-38,13,0,Math.PI*2);ctx.fill();ctx.stroke()}ctx.restore()}
function updateText(){const st=getState();document.getElementById('tText').textContent=`${st.t.toFixed(2)} s`;document.getElementById('xText').textContent=`${st.x.toFixed(1)} m`;document.getElementById('vText').textContent=`${st.v.toFixed(2)} m/s`;document.getElementById('aTextBox').textContent=`${st.a.toFixed(2)} m/s²`;document.getElementById('x0Text').textContent=`${n(x0).toFixed(0)} m`;document.getElementById('v0Text').textContent=`${n(v0).toFixed(1)} m/s`;document.getElementById('aText').textContent=`${n(acc).toFixed(1)} m/s²`;document.getElementById('TText').textContent=`${n(T).toFixed(0)} s`}
function updateUI(){const isFree=mode==='free';document.getElementById('paramPanel').style.display=isFree?'none':'block';document.getElementById('timeControls').style.display=isFree?'none':'flex';playBtn.style.display=isFree?'none':'inline-block';clearBtn.style.display=isFree?'inline-block':'none';zeroBtn.style.display=isFree?'inline-block':'none';document.getElementById('aParam').style.display=mode==='accel'?'block':'none';document.getElementById('hint').textContent=isFree?'拖住小车左右移动':'点击播放，或拖动时间滑块';document.getElementById('xtHint').textContent=isFree?'实时绘制':'演示生成';document.getElementById('vtHint').textContent=isFree?'实时绘制':'演示生成';playBtn.textContent=playing?'暂停':'播放'}
function drawAll(){updateUI();updateText();drawMotion();drawGraph(xctx,'x');drawGraph(vctx,'v')}
function stopPlay(){if(timer)clearInterval(timer);playing=false}
function setMode(m){stopPlay();mode=m;tabs.forEach(b=>b.classList.toggle('active',b.dataset.mode===m));if(m==='free'){elapsed=0;xNow=0;vNow=0;aNow=0;data=[{t:0,x:0,v:0,a:0}]}if(m==='uniform'){x0.value=0;v0.value=6;acc.value=0;T.value=10;timeSlider.value=0}if(m==='accel'){x0.value=0;v0.value=1;acc.value=1;T.value=10;timeSlider.value=0}timeSlider.max=T.value;drawAll()}
tabs.forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
[x0,v0,acc,T,timeSlider].forEach(e=>e.oninput=()=>{timeSlider.max=T.value;if(n(timeSlider)>n(T))timeSlider.value=T.value;drawAll()});
playBtn.onclick=()=>{if(mode==='free')return;playing=!playing;if(playing){timer=setInterval(()=>{let t=n(timeSlider)+n(T)/350;if(t>n(T)){t=n(T);stopPlay()}timeSlider.value=t;drawAll()},25)}else stopPlay();drawAll()};
clearBtn.onclick=()=>{stopPlay();elapsed=0;vNow=0;aNow=0;lastT=null;lastX=null;data=[{t:0,x:xNow,v:0,a:0}];drawAll()};
zeroBtn.onclick=()=>{stopPlay();xNow=0;elapsed=0;vNow=0;aNow=0;lastT=null;lastX=null;data=[{t:0,x:0,v:0,a:0}];drawAll()};
setMode('free');
</script>
</body>
</html>
