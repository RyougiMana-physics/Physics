<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>x-t 图像交互教学</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #607081;
      --line: #d8e0e8;
      --panel: #ffffff;
      --page: #f5f7fa;
      --accent: #0f8b8d;
      --accent-strong: #0a6f71;
      --accent-soft: #e4f6f4;
      --warm: #d96c2c;
      --blue: #276ef1;
      --green: #218c5a;
      --shadow: 0 18px 42px rgba(22, 33, 43, 0.10);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, rgba(15, 139, 141, 0.09), rgba(245, 247, 250, 0) 230px), var(--page);
    }
    button, input { font: inherit; }
    .app { width: min(1440px, calc(100vw - 32px)); margin: auto; padding: 22px 0 28px; }
    header { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: end; margin-bottom: 16px; }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 38px); line-height: 1.12; letter-spacing: 0; }
    .sub { margin: 7px 0 0; color: var(--muted); font-size: 15px; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(94px, 1fr)); gap: 8px; min-width: 330px; }
    .stat { background: rgba(255,255,255,.82); border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; box-shadow: 0 8px 24px rgba(22,33,43,.06); }
    .stat span { display: block; color: var(--muted); font-size: 12px; }
    .stat strong { display: block; margin-top: 2px; font-size: 18px; white-space: nowrap; }
    .layout { display: grid; grid-template-columns: minmax(290px, 360px) minmax(0, 1fr); gap: 16px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .controls { padding: 16px; position: sticky; top: 12px; }
    .section { padding: 15px 0; border-top: 1px solid var(--line); }
    .section:first-child { padding-top: 0; border-top: 0; }
    .title { font-weight: 700; font-size: 15px; margin-bottom: 10px; }
    .seg { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
    .seg button, .chip { min-height: 38px; border: 1px solid var(--line); border-radius: 8px; background: #f8fafc; color: var(--ink); cursor: pointer; transition: border-color .15s ease, background .15s ease, color .15s ease; }
    .seg button:hover, .chip:hover, .icon:hover { border-color: #b8c7d4; }
    .active { background: var(--accent-soft) !important; border-color: var(--accent) !important; color: var(--accent-strong) !important; font-weight: 700; }
    .field { display: grid; gap: 7px; margin-top: 12px; }
    .field label { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 13px; }
    .field output { color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .numrow { display: grid; grid-template-columns: 1fr 82px; gap: 8px; align-items: center; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    input[type="number"] { width: 100%; min-height: 34px; border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; background: #fbfcfe; }
    .toggles { display: grid; gap: 8px; }
    .toggle { display: grid; grid-template-columns: auto 1fr; gap: 9px; align-items: center; font-size: 14px; }
    .toggle input { width: 18px; height: 18px; accent-color: var(--accent); }
    .main { display: grid; gap: 16px; }
    .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 15px; border-bottom: 1px solid var(--line); }
    .head strong { font-size: 16px; }
    .readouts { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .readout { min-width: 86px; padding: 6px 9px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfe; font-variant-numeric: tabular-nums; text-align: center; font-size: 13px; }
    .canvasbox { min-height: 240px; background: linear-gradient(180deg, #ffffff, #f8fbfd); }
    canvas { display: block; width: 100%; }
    #motion { height: 250px; cursor: grab; touch-action: none; }
    #motion.dragging { cursor: grabbing; }
    #graph { height: 430px; }
    .transport { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; padding: 13px 15px 15px; border-top: 1px solid var(--line); }
    .buttons { display: flex; gap: 8px; }
    .icon { width: 40px; height: 40px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 8px; background: #ffffff; cursor: pointer; }
    .primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
    .time { min-width: 96px; text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
    .formulas { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; padding: 12px 15px; border-top: 1px solid var(--line); background: #fbfcfe; }
    .formula { border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; background: #ffffff; min-height: 58px; }
    .formula span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 3px; }
    .formula strong { font-family: "Cambria Math", "Times New Roman", serif; font-size: 18px; overflow-wrap: anywhere; }
    .mini { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .note { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 10px; }
    .fullscreen-btn { min-height: 42px; padding: 8px 13px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink); cursor: pointer; white-space: nowrap; box-shadow: 0 8px 24px rgba(22,33,43,.06); }
    .fullscreen-btn:hover { border-color: var(--accent); color: var(--accent-strong); }
    @media (min-width: 1400px) and (min-height: 800px) {
      .app { width: min(1840px, calc(100vw - 36px)); padding-top: 18px; }
      .layout { grid-template-columns: minmax(360px, 400px) minmax(0, 1fr); gap: 18px; }
      #motion { height: clamp(270px, 27vh, 320px); }
      #graph { height: clamp(440px, 42vh, 520px); }
    }
    @media (max-width: 980px) { header, .layout { grid-template-columns: 1fr; } .stats { min-width: 0; } .controls { position: static; } .fullscreen-btn { justify-self: start; } }
    @media (max-width: 640px) { .app { width: min(100vw - 18px, 1440px); padding-top: 12px; } .stats, .formulas { grid-template-columns: 1fr; } .head, .transport { grid-template-columns: 1fr; } .transport { display: grid; } .readouts, .buttons { justify-content: flex-start; } .time { text-align: left; } #motion { height: 220px; } #graph { height: 360px; } }
    @media (min-width: 981px) {
      html, body { height: auto; overflow: auto; }
      .app {
        width: min(1680px, calc(100vw - 28px));
        max-width: 1680px;
        height: auto;
        padding: 16px 0 24px;
        display: block;
      }
      header { margin-bottom: 14px; }
      .layout {
        grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }
      .controls {
        position: sticky;
        height: auto;
        overflow: visible;
      }
      .main {
        height: auto;
        display: grid;
        grid-template-rows: none;
        gap: 16px;
      }
      .main > .panel {
        display: block;
      }
      .main .canvasbox {
        min-height: 240px;
      }
      #motion { height: 280px; }
      #graph { height: 470px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>x-t 图像交互教学</h1>
        <p class="sub">物体沿 x 方向运动，位置、速度、斜率和曲线同步变化。</p>
      </div>
      <div class="stats">
        <div class="stat"><span>时间 t</span><strong id="statT">0.00 s</strong></div>
        <div class="stat"><span>位置 x</span><strong id="statX">0.00 m</strong></div>
        <div class="stat"><span>速度 v</span><strong id="statV">0.00 m/s</strong></div>
      </div>
      <button class="fullscreen-btn" id="fullscreenBtn" title="进入或退出全屏">⛶ 全屏展示</button>
    </header>

    <div class="layout">
      <aside class="panel controls">
        <section class="section">
          <div class="title">运动类型</div>
          <div class="seg">
            <button data-preset="uniform">匀速直线</button>
            <button data-preset="accelerate">匀加速</button>
            <button data-preset="decelerate">先快后慢</button>
            <button data-preset="reverse">折返运动</button>
            <button data-preset="free">自由拖动</button>
          </div>
        </section>

        <section class="section">
          <div class="title">参数</div>
          <div class="field"><label>初位置 x0 <output id="x0Out"></output></label><div class="numrow"><input id="x0S" type="range" min="-20" max="20" step="0.5"><input id="x0N" type="number" min="-20" max="20" step="0.5"></div></div>
          <div class="field"><label>初速度 v0 <output id="v0Out"></output></label><div class="numrow"><input id="v0S" type="range" min="-12" max="12" step="0.2"><input id="v0N" type="number" min="-12" max="12" step="0.2"></div></div>
          <div class="field"><label>加速度 a <output id="aOut"></output></label><div class="numrow"><input id="aS" type="range" min="-4" max="4" step="0.1"><input id="aN" type="number" min="-4" max="4" step="0.1"></div></div>
          <div class="field"><label>总时间 <output id="durationOut"></output></label><div class="numrow"><input id="durationS" type="range" min="2" max="60" step="0.5"><input id="durationN" type="number" min="2" max="60" step="0.5"></div></div>
        </section>

        <section class="section">
          <div class="title">显示</div>
          <div class="toggles">
            <label class="toggle"><input id="showSlope" type="checkbox" checked>切线斜率</label>
            <label class="toggle"><input id="showTrace" type="checkbox" checked>运动轨迹</label>
            <label class="toggle"><input id="showGrid" type="checkbox" checked>网格线</label>
            <label class="toggle"><input id="showData" type="checkbox">采样点</label>
          </div>
        </section>

        <section class="section">
          <div class="title">播放</div>
          <div class="mini">
            <button class="chip active" data-speed="1">1x</button>
            <button class="chip" data-speed="0.5">0.5x</button>
            <button class="chip" data-speed="2">2x</button>
            <button class="chip" id="stepBtn">步进 0.2s</button>
            <button class="chip" id="clearBtn">清空图像</button>
          </div>
          <p class="note">图像上当前点的切线斜率等于此刻速度。</p>
        </section>
      </aside>

      <section class="main">
        <article class="panel">
          <div class="head"><strong>一维运动演示</strong><div class="readouts"><span class="readout" id="rangeText"></span><span class="readout" id="dirText"></span></div></div>
          <div class="canvasbox"><canvas id="motion"></canvas></div>
          <div class="transport"><div class="buttons"><button class="icon primary" id="play" title="播放/暂停">▶</button><button class="icon" id="reset" title="回到起点">↺</button></div><input id="timeS" type="range" min="0" max="8" step="0.01" value="0"><div class="time" id="timeText"></div></div>
        </article>

        <article class="panel">
          <div class="head"><strong>x-t 图像</strong><div class="readouts"><span class="readout" id="slopeText"></span><span class="readout" id="shapeText"></span></div></div>
          <div class="canvasbox"><canvas id="graph"></canvas></div>
          <div class="formulas"><div class="formula"><span>位置函数</span><strong id="xFormula"></strong></div><div class="formula"><span>速度函数</span><strong id="vFormula"></strong></div><div class="formula"><span>此刻对应</span><strong id="pointFormula"></strong></div></div>
        </article>
      </section>
    </div>
  </main>

<script>
const byId = id => document.getElementById(id);
const E = {
  motion: byId('motion'), graph: byId('graph'), play: byId('play'), reset: byId('reset'), timeS: byId('timeS'),
  statT: byId('statT'), statX: byId('statX'), statV: byId('statV'), timeText: byId('timeText'),
  rangeText: byId('rangeText'), dirText: byId('dirText'), slopeText: byId('slopeText'), shapeText: byId('shapeText'),
  xFormula: byId('xFormula'), vFormula: byId('vFormula'), pointFormula: byId('pointFormula'),
  showSlope: byId('showSlope'), showTrace: byId('showTrace'), showGrid: byId('showGrid'), showData: byId('showData'), clearBtn: byId('clearBtn')
};
const fields = [['x0','x0S','x0N','x0Out','m'], ['v0','v0S','v0N','v0Out','m/s'], ['a','aS','aN','aOut','m/s²'], ['duration','durationS','durationN','durationOut','s']];
const presets = {
  uniform: { x0: 0, v0: 4, a: 0, duration: 8 },
  accelerate: { x0: 0, v0: 1.5, a: 0.8, duration: 8 },
  decelerate: { x0: 0, v0: 8, a: -0.9, duration: 10 },
  reverse: { x0: 8, v0: 6, a: -1.6, duration: 9 },
  free: { x0: 0, v0: 0, a: 0, duration: 8 }
};
let S = { ...presets.uniform, t: 0, playing: false, speed: 1, preset: 'uniform', last: 0, samples: [], dragData: [], dragging: false, dragStart: 0, dragRange: null };
const mc = E.motion.getContext('2d');
const gc = E.graph.getContext('2d');
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const X_MIN = -40, X_MAX = 40, TIME_MAX = 60;
const fullscreenBtn = byId('fullscreenBtn');
fullscreenBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});
document.addEventListener('fullscreenchange', () => {
  fullscreenBtn.textContent = document.fullscreenElement ? '⛶ 退出全屏' : '⛶ 全屏展示';
});
const isFree = () => S.preset === 'free';
const physicsX = t => S.x0 + S.v0 * t + 0.5 * S.a * t * t;
const physicsV = t => S.v0 + S.a * t;
const f = (v, d = 2) => { const s = (+v).toFixed(d); return s.match(/^-0\.0+$/) ? s.slice(1) : s; };
const fc = v => (+v).toFixed(1).replace('.0','');

function recordEnd() {
  if (isFree() && S.dragData.length > 1) return Math.max(0.05, S.dragData[S.dragData.length - 1].t);
  return S.duration;
}
function freeX(t) {
  if (!S.dragData.length) return S.x0;
  if (t <= S.dragData[0].t) return S.dragData[0].x;
  for (let i = 1; i < S.dragData.length; i++) {
    const a = S.dragData[i - 1], b = S.dragData[i];
    if (t <= b.t) {
      const k = (t - a.t) / Math.max(0.0001, b.t - a.t);
      return a.x + (b.x - a.x) * k;
    }
  }
  return S.dragData[S.dragData.length - 1].x;
}
function freeV(t) {
  if (S.dragData.length < 2) return 0;
  let best = 1;
  for (let i = 1; i < S.dragData.length; i++) {
    if (S.dragData[i].t >= t) { best = i; break; }
    best = i;
  }
  const a = S.dragData[Math.max(0, best - 1)], b = S.dragData[Math.min(S.dragData.length - 1, best)];
  return (b.x - a.x) / Math.max(0.04, b.t - a.t);
}
function xAt(t) { return clamp(isFree() ? freeX(t) : physicsX(t), X_MIN, X_MAX); }
function vAt(t) { return isFree() ? freeV(t) : physicsV(t); }
function graphPoints() { return isFree() ? S.dragData : S.samples; }

function range() {
  return { min: X_MIN, max: X_MAX };
}
function samples() {
  S.samples = [];
  const n = Math.max(32, Math.round(S.duration * 18));
  for (let i = 0; i <= n; i++) { const t = S.duration * i / n; S.samples.push({ t, x: clamp(physicsX(t), X_MIN, X_MAX), v: physicsV(t) }); }
}
function size(c, ctx) {
  const r = c.getBoundingClientRect(), d = devicePixelRatio || 1, w = Math.max(320, Math.round(r.width)), h = Math.max(220, Math.round(r.height));
  if (c.width !== Math.round(w * d) || c.height !== Math.round(h * d)) { c.width = Math.round(w * d); c.height = Math.round(h * d); ctx.setTransform(d, 0, 0, d, 0, 0); }
  return { w, h };
}
function step(r, n) { const raw = r / n, p = 10 ** Math.floor(Math.log10(raw)), q = raw / p, m = q > 5 ? 10 : q > 2 ? 5 : q > 1 ? 2 : 1; return m * p; }
function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

function drawMotion() {
  const { w, h } = size(E.motion, mc), r = range(), ctx = mc, left = 48, right = w - 48, ay = Math.round(h * .62);
  const map = x => left + (x - r.min) / (r.max - r.min) * (right - left);
  const x = xAt(S.t), v = vAt(S.t), px = map(x), spx = isFree() && S.dragData.length ? map(S.dragData[0].x) : map(S.x0);
  ctx.clearRect(0,0,w,h);
  const bg = ctx.createLinearGradient(0,0,0,h); bg.addColorStop(0,'#fff'); bg.addColorStop(1,'#eef7f7'); ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);
  ctx.fillStyle = '#e9f2f4'; ctx.fillRect(0, ay + 28, w, h - ay);
  ctx.strokeStyle = '#c8d4dd'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(left, ay); ctx.lineTo(right, ay); ctx.stroke();
  const st = step(r.max - r.min, 9), first = Math.ceil(r.min / st) * st;
  ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let xx = first; xx <= r.max + st * .5; xx += st) {
    const tx = map(xx); ctx.strokeStyle = Math.abs(xx) < st * .05 ? '#8192a3' : '#d0d9e2'; ctx.lineWidth = Math.abs(xx) < st * .05 ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(tx, ay - 12); ctx.lineTo(tx, ay + 12); ctx.stroke(); ctx.fillStyle = '#607081'; ctx.fillText(fc(xx) + ' m', tx, ay + 18);
  }
  ctx.strokeStyle = ctx.fillStyle = '#94a3b8'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(right - 12, ay - 6); ctx.lineTo(right, ay); ctx.lineTo(right - 12, ay + 6); ctx.stroke(); ctx.fillText('+x', right - 2, ay - 33);
  if (E.showTrace.checked) {
    const points = graphPoints();
    ctx.strokeStyle = 'rgba(217,108,44,.72)'; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.beginPath();
    if (isFree() && points.length > 1) points.filter(p => p.t <= S.t).forEach((p, i) => i ? ctx.lineTo(map(p.x), ay) : ctx.moveTo(map(p.x), ay));
    else { ctx.moveTo(Math.min(spx, px), ay); ctx.lineTo(Math.max(spx, px), ay); }
    ctx.stroke(); ctx.lineCap = 'butt';
  }
  ctx.fillStyle = '#0f8b8d'; ctx.beginPath(); ctx.arc(px, ay, 16, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(px - 5, ay - 5, 4, 0, Math.PI * 2); ctx.fill();
  const len = clamp(Math.abs(v) * 9, 24, 82), dir = v >= 0 ? 1 : -1, as = px + dir * 24, ae = as + dir * len;
  ctx.strokeStyle = ctx.fillStyle = v >= 0 ? '#218c5a' : '#d96c2c'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(as, ay - 38); ctx.lineTo(ae, ay - 38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ae, ay - 38); ctx.lineTo(ae - dir * 10, ay - 45); ctx.lineTo(ae - dir * 10, ay - 31); ctx.closePath(); ctx.fill(); ctx.lineCap = 'butt';
  ctx.font = '700 15px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.fillStyle = '#17212b'; ctx.fillText('x = ' + f(x) + ' m', clamp(px,72,w-72), ay - 56);
  ctx.fillStyle = 'rgba(23,33,43,.12)'; ctx.beginPath(); ctx.ellipse(px, ay + 22, 28, 7, 0, 0, Math.PI * 2); ctx.fill();
  E.rangeText.textContent = 'x: ' + fc(r.min) + ' 到 ' + fc(r.max) + ' m';
  E.dirText.textContent = Math.abs(v) < .01 ? '瞬时静止' : v > 0 ? '向 +x 方向' : '向 -x 方向';
}

function drawGraph() {
  const { w, h } = size(E.graph, gc), r = range(), ctx = gc, L = 64, R = w - 28, T = 30, B = h - 54, W = R - L, H = B - T, totalT = recordEnd();
  const tx = t => L + t / totalT * W, xy = x => B - (x - r.min) / (r.max - r.min) * H;
  const axisY = clamp(xy(0), T, B);
  const x = xAt(S.t), v = vAt(S.t), cx = tx(clamp(S.t, 0, totalT)), cy = xy(x), points = graphPoints();
  ctx.clearRect(0,0,w,h); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h); ctx.font = '12px Arial'; ctx.textBaseline = 'middle';
  if (E.showGrid.checked) {
    const xs = step(r.max - r.min, 8), fx = Math.ceil(r.min / xs) * xs;
    for (let xx = fx; xx <= r.max + xs * .5; xx += xs) { const y = xy(xx); ctx.strokeStyle = Math.abs(xx) < xs * .05 ? '#9aabba' : '#e4eaf0'; ctx.lineWidth = Math.abs(xx) < xs * .05 ? 1.5 : 1; ctx.beginPath(); ctx.moveTo(L,y); ctx.lineTo(R,y); ctx.stroke(); ctx.fillStyle = '#607081'; ctx.textAlign = 'right'; ctx.fillText(fc(xx), L - 9, y); }
    const ts = step(totalT, 8);
    for (let t = 0; t <= totalT + ts * .5; t += ts) { const x0 = tx(t); ctx.strokeStyle = '#e4eaf0'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x0,T); ctx.lineTo(x0,B); ctx.stroke(); ctx.fillStyle = '#607081'; ctx.textAlign = 'center'; ctx.fillText(fc(t), x0, axisY + 18); }
  }
  ctx.strokeStyle = '#17212b'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(L,axisY); ctx.lineTo(R,axisY); ctx.moveTo(L,B); ctx.lineTo(L,T); ctx.stroke();
  ctx.fillStyle = '#17212b'; ctx.beginPath(); ctx.moveTo(R,axisY); ctx.lineTo(R-10,axisY-5); ctx.lineTo(R-10,axisY+5); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(L,T); ctx.lineTo(L-5,T+10); ctx.lineTo(L+5,T+10); ctx.closePath(); ctx.fill();
  ctx.font = '700 13px Arial'; ctx.textAlign = 'right'; ctx.fillText('x/m', L - 8, T - 12); ctx.textAlign = 'left'; ctx.fillText('t/s', R - 8, axisY + 28);
  ctx.save(); ctx.beginPath(); ctx.rect(L,T,W,H); ctx.clip();
  ctx.strokeStyle = '#0f8b8d'; ctx.lineWidth = 3; ctx.beginPath(); points.forEach((p,i) => i ? ctx.lineTo(tx(p.t), xy(p.x)) : ctx.moveTo(tx(p.t), xy(p.x))); ctx.stroke();
  ctx.strokeStyle = '#d96c2c'; ctx.lineWidth = 4; ctx.beginPath(); points.filter(p => p.t <= S.t).forEach((p,i) => i ? ctx.lineTo(tx(p.t), xy(p.x)) : ctx.moveTo(tx(p.t), xy(p.x))); ctx.stroke();
  if (E.showData.checked) { ctx.fillStyle = '#276ef1'; const every = Math.max(1, Math.floor(points.length / 18)); points.forEach((p,i) => { if (i % every === 0 || i === points.length - 1) { ctx.beginPath(); ctx.arc(tx(p.t), xy(p.x), 3.5, 0, Math.PI * 2); ctx.fill(); } }); }
  if (E.showSlope.checked) { const dt = totalT * .11, t1 = clamp(S.t - dt, 0, totalT), t2 = clamp(S.t + dt, 0, totalT), x1 = x + v * (t1 - S.t), x2 = x + v * (t2 - S.t); ctx.strokeStyle = 'rgba(217,108,44,.8)'; ctx.lineWidth = 2; ctx.setLineDash([8,6]); ctx.beginPath(); ctx.moveTo(tx(t1), xy(x1)); ctx.lineTo(tx(t2), xy(x2)); ctx.stroke(); ctx.setLineDash([]); }
  ctx.strokeStyle = 'rgba(39,110,241,.42)'; ctx.lineWidth = 1.5; ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(cx,axisY); ctx.lineTo(cx,cy); ctx.lineTo(L,cy); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#d96c2c'; ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); ctx.restore();
  const lx = clamp(cx + 82, L + 82, R - 82), ly = clamp(cy - 28, T + 18, B - 18); ctx.fillStyle = 'rgba(255,255,255,.94)'; ctx.strokeStyle = '#d8e0e8'; roundRect(ctx, lx - 73, ly - 18, 146, 36, 7); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#17212b'; ctx.font = '700 13px Arial'; ctx.textAlign = 'center'; ctx.fillText('(' + f(S.t) + ', ' + f(x) + ')', lx, ly);
}

function formulas() {
  if (isFree()) { E.xFormula.textContent = 'x = 拖动记录'; E.vFormula.textContent = 'v = x-t 图像斜率'; return; }
  const half = .5 * S.a, parts = ['x = ' + f(S.x0,1), S.v0 >= 0 ? '+ ' + f(S.v0,1) + 't' : '- ' + f(Math.abs(S.v0),1) + 't'];
  if (Math.abs(half) > .001) parts.push(half >= 0 ? '+ ' + f(half,2) + 't²' : '- ' + f(Math.abs(half),2) + 't²');
  E.xFormula.textContent = parts.join(' '); E.vFormula.textContent = Math.abs(S.a) < .001 ? 'v = ' + f(S.v0,1) : 'v = ' + f(S.v0,1) + ' ' + (S.a >= 0 ? '+' : '-') + ' ' + f(Math.abs(S.a),1) + 't';
}
function text() {
  const x = xAt(S.t), v = vAt(S.t), totalT = recordEnd();
  E.statT.textContent = f(S.t) + ' s'; E.statX.textContent = f(x) + ' m'; E.statV.textContent = f(v) + ' m/s';
  E.timeText.textContent = f(S.t) + ' / ' + f(totalT) + ' s'; E.timeS.max = totalT; E.timeS.value = clamp(S.t, 0, totalT);
  E.slopeText.textContent = '斜率 ' + f(v) + ' m/s'; E.shapeText.textContent = isFree() ? '手动曲线' : Math.abs(S.a) < .001 ? '直线' : S.a > 0 ? '上弯曲线' : '下弯曲线';
  fields.forEach(([p,s,n,o,u]) => byId(o).textContent = f(S[p],1) + ' ' + u); formulas(); E.pointFormula.textContent = '(' + f(S.t) + ' s, ' + f(x) + ' m)';
}
function draw() { text(); drawMotion(); drawGraph(); }
function setParams(p, keep = false) {
  Object.assign(S, { x0: +p.x0, v0: +p.v0, a: +p.a, duration: clamp(+p.duration, 2, TIME_MAX) }); S.t = keep ? clamp(S.t, 0, recordEnd()) : 0;
  if (isFree()) { S.dragRange = { min: X_MIN, max: X_MAX }; S.dragData = [{ t: 0, x: S.x0 }]; }
  fields.forEach(([p,s,n]) => { byId(s).value = S[p]; byId(n).value = S[p]; }); samples(); setActive(); draw();
}
fields.forEach(([p,s,n]) => {
  const sl = byId(s), nu = byId(n);
  function upd() { S.preset = 'custom'; S[p] = p === 'duration' ? clamp(+sl.value, 2, TIME_MAX) : +sl.value; if (p === 'duration') { sl.value = S[p]; S.t = clamp(S.t, 0, S.duration); } nu.value = sl.value; samples(); setActive(); draw(); }
  function num() { const v = clamp(+nu.value, +sl.min, +sl.max); sl.value = nu.value = v; upd(); }
  sl.addEventListener('input', upd); nu.addEventListener('input', () => nu.value !== '' && num()); nu.addEventListener('change', num);
});
function setActive() { document.querySelectorAll('[data-preset]').forEach(b => b.classList.toggle('active', b.dataset.preset === S.preset)); document.querySelectorAll('[data-speed]').forEach(b => b.classList.toggle('active', +b.dataset.speed === S.speed)); }
document.querySelectorAll('[data-preset]').forEach(b => b.onclick = () => { S.preset = b.dataset.preset; setParams(presets[S.preset]); });
document.querySelectorAll('[data-speed]').forEach(b => b.onclick = () => { S.speed = +b.dataset.speed; setActive(); });
byId('stepBtn').onclick = () => { S.t = clamp(S.t + .2, 0, recordEnd()); draw(); };
E.clearBtn.onclick = () => { S.playing = false; E.play.textContent = '▶'; S.preset = 'free'; S.t = 0; S.dragRange = { min: X_MIN, max: X_MAX }; S.dragData = [{ t: 0, x: S.x0 }]; setActive(); draw(); };
[E.showSlope,E.showTrace,E.showGrid,E.showData].forEach(i => i.onchange = draw);
E.timeS.oninput = () => { S.t = +E.timeS.value; draw(); };
E.reset.onclick = () => { S.playing = false; S.t = 0; E.play.textContent = '▶'; draw(); };
E.play.onclick = toggle;
function toggle() { S.playing = !S.playing; E.play.textContent = S.playing ? '⏸' : '▶'; if (S.playing) { if (S.t >= recordEnd()) S.t = 0; S.last = 0; requestAnimationFrame(anim); } }
function anim(now) { if (!S.playing) return; const d = S.last ? (now - S.last) / 1000 : 0; S.last = now; S.t += d * S.speed; if (S.t >= recordEnd()) { S.t = recordEnd(); S.playing = false; E.play.textContent = '▶'; } draw(); if (S.playing) requestAnimationFrame(anim); }

function pointerPosition(event) {
  const rect = E.motion.getBoundingClientRect(), r = range(), left = 48, right = rect.width - 48;
  const ratio = clamp((event.clientX - rect.left - left) / Math.max(1, right - left), 0, 1);
  return r.min + ratio * (r.max - r.min);
}
function addDragPoint(t, x) {
  x = clamp(x, S.dragRange.min, S.dragRange.max);
  const last = S.dragData[S.dragData.length - 1];
  if (!last || t - last.t > 0.025 || Math.abs(x - last.x) > 0.08) S.dragData.push({ t, x });
  else { last.t = t; last.x = x; }
  S.t = t;
}
E.motion.addEventListener('pointerdown', event => {
  const before = range(); S.playing = false; E.play.textContent = '▶'; S.preset = 'free'; S.dragRange = { min: X_MIN, max: X_MAX };
  S.dragging = true; S.dragStart = performance.now(); S.dragData = []; E.motion.classList.add('dragging'); E.motion.setPointerCapture(event.pointerId);
  addDragPoint(0, pointerPosition(event)); setActive(); draw(); event.preventDefault();
});
E.motion.addEventListener('pointermove', event => {
  if (!S.dragging) return;
  const t = clamp((performance.now() - S.dragStart) / 1000, 0, S.duration);
  addDragPoint(t, pointerPosition(event)); draw();
  if (t >= S.duration) endDrag(event);
});
function endDrag(event) { if (!S.dragging) return; S.dragging = false; E.motion.classList.remove('dragging'); try { E.motion.releasePointerCapture(event.pointerId); } catch (e) {} draw(); }
E.motion.addEventListener('pointerup', endDrag);
E.motion.addEventListener('pointercancel', endDrag);
addEventListener('resize', draw);
addEventListener('keydown', e => { if (e.target.matches('input,button')) return; if (e.code === 'Space') { e.preventDefault(); toggle(); } if (e.key === 'ArrowRight') { S.t = clamp(S.t + .1, 0, recordEnd()); draw(); } if (e.key === 'ArrowLeft') { S.t = clamp(S.t - .1, 0, recordEnd()); draw(); } });
setParams(presets.uniform);
</script>
