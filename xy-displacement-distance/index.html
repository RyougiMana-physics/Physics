<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>x-y 平面运动：位移与路程</title>
<style>
:root{--ink:#17212b;--muted:#617080;--line:#d7e0e8;--page:#f4f7f9;--panel:#fff;--teal:#087f78;--tealSoft:#e4f4f1;--blue:#246fe5;--orange:#e16829;--shadow:0 16px 38px rgba(25,43,58,.1);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;color:var(--ink)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,rgba(8,127,120,.08),transparent 220px),var(--page)}button,input{font:inherit}button{color:inherit}.app{width:min(1480px,calc(100vw - 28px));margin:auto;padding:20px 0 28px}header{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:15px}h1{margin:0;font-size:clamp(25px,3vw,38px);line-height:1.15;letter-spacing:0}.subtitle{margin:6px 0 0;color:var(--muted);font-size:15px}.summary{display:grid;grid-template-columns:repeat(2,minmax(145px,1fr));gap:8px;min-width:320px}.summary-item{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.9);padding:9px 12px}.summary-item span{display:block;color:var(--muted);font-size:12px}.summary-item strong{display:block;margin-top:2px;font-size:20px;font-variant-numeric:tabular-nums}.distance strong{color:var(--orange)}.displacement strong{color:var(--blue)}.layout{display:grid;grid-template-columns:minmax(260px,320px) minmax(0,1fr);gap:15px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}aside{padding:15px;position:sticky;top:12px}.group{padding:14px 0;border-top:1px solid var(--line)}.group:first-child{border-top:0;padding-top:0}.group-title{margin:0 0 9px;font-size:14px;font-weight:700}.preset-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.preset,.small-btn{min-height:40px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#f8fafc;cursor:pointer;transition:background .15s,border-color .15s,transform .15s}.preset:hover,.small-btn:hover,.icon-btn:hover{border-color:#aebdca}.preset:active,.small-btn:active,.icon-btn:active{transform:translateY(1px)}.preset.active{background:var(--tealSoft);border-color:var(--teal);color:#066d67;font-weight:700}.toggle-list{display:grid;gap:9px}.toggle{display:grid;grid-template-columns:auto 1fr;align-items:center;gap:9px;font-size:14px;cursor:pointer}.toggle input{width:18px;height:18px;margin:0;accent-color:var(--teal)}.value-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.value{min-height:60px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fbfcfe}.value span{display:block;color:var(--muted);font-size:12px}.value strong{display:block;margin-top:4px;font-size:16px;font-variant-numeric:tabular-nums;overflow-wrap:anywhere}.classroom{display:grid;gap:7px}.classroom .small-btn{text-align:left;background:#fff}.main{min-width:0}.stage-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line)}.stage-head strong{font-size:16px}.legend{display:flex;align-items:center;flex-wrap:wrap;gap:13px;color:var(--muted);font-size:13px}.key{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}.line-key{width:22px;height:4px;border-radius:2px;background:var(--orange)}.arrow-key{width:22px;height:4px;border-radius:2px;background:var(--blue);position:relative}.arrow-key:after{content:"";position:absolute;right:-1px;top:-4px;border-left:7px solid var(--blue);border-top:6px solid transparent;border-bottom:6px solid transparent}.canvas-wrap{position:relative;min-height:580px;background:#fbfdfe}canvas{display:block;width:100%;height:580px;touch-action:none;cursor:crosshair}canvas.dragging{cursor:grabbing}.badge{position:absolute;left:14px;top:14px;max-width:calc(100% - 28px);padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.92);color:var(--muted);font-size:13px;pointer-events:none}.transport{display:grid;grid-template-columns:auto minmax(120px,1fr) auto;gap:12px;align-items:center;padding:12px 14px 14px;border-top:1px solid var(--line)}.transport-buttons{display:flex;gap:7px}.icon-btn{width:42px;height:42px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:19px;line-height:1}.icon-btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}input[type=range]{width:100%;accent-color:var(--teal)}.time{min-width:92px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}.concepts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border-top:1px solid var(--line)}.concept{padding:13px 15px 15px;min-height:86px}.concept+.concept{border-left:1px solid var(--line)}.concept h2{margin:0 0 6px;font-size:15px}.concept p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.orange{color:var(--orange)}.blue{color:var(--blue)}
.fullscreen-btn{min-height:42px;padding:8px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;white-space:nowrap;box-shadow:0 8px 24px rgba(25,43,58,.06)}.fullscreen-btn:hover{border-color:var(--teal);color:var(--teal)}
@media(min-width:1400px) and (min-height:800px){.app{width:min(1840px,calc(100vw - 36px));padding-top:18px}.layout{grid-template-columns:minmax(330px,370px) minmax(0,1fr);gap:18px}.canvas-wrap{min-height:620px;height:clamp(620px,calc(100vh - 330px),760px)}canvas{height:100%}}
@media(max-width:980px){header{align-items:stretch;flex-direction:column}.summary{min-width:0}.layout{grid-template-columns:1fr}aside{position:static}.group-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.canvas-wrap{min-height:500px}canvas{height:500px}.fullscreen-btn{align-self:flex-start}}
@media(max-width:620px){.app{width:calc(100vw - 16px);padding-top:11px}.summary,.group-row,.concepts{grid-template-columns:1fr}.stage-head{align-items:flex-start;flex-direction:column}.canvas-wrap{min-height:420px}canvas{height:420px}.transport{grid-template-columns:1fr}.time{text-align:left}.concept+.concept{border-left:0;border-top:1px solid var(--line)}}
@media(min-width:981px){html,body{height:100%;overflow:hidden}.app{width:calc(100vw - 20px);max-width:none;height:100vh;padding:10px 0 12px;display:flex;flex-direction:column}header{flex:0 0 auto;margin-bottom:10px}.layout{flex:1 1 auto;min-height:0;grid-template-columns:minmax(280px,320px) minmax(0,1fr);gap:12px;align-items:stretch}aside{position:static;height:100%;overflow-y:auto}.main{display:flex;min-height:0;flex-direction:column}.stage-head,.transport,.concepts{flex:0 0 auto}.canvas-wrap{flex:1 1 auto;min-height:0;height:auto}canvas{height:100%}}
</style>
</head>
<body>
<main class="app">
<header><div><h1>x-y 平面运动</h1><p class="subtitle">位移与路程互动实验</p></div><div class="summary"><div class="summary-item distance"><span>路程 s</span><strong id="distanceTop">0.00 m</strong></div><div class="summary-item displacement"><span>位移大小 |Δr|</span><strong id="displacementTop">0.00 m</strong></div></div><button class="fullscreen-btn" id="fullscreenBtn" title="进入或退出全屏">⛶ 全屏展示</button></header>
<div class="layout">
<aside class="panel">
<section class="group"><h2 class="group-title">运动路径</h2><div class="preset-grid"><button class="preset active" data-preset="free">自由拖动</button><button class="preset" data-preset="straight">直线运动</button><button class="preset" data-preset="corner">折线运动</button><button class="preset" data-preset="circle">圆周运动</button><button class="preset" data-preset="return">回到起点</button></div></section>
<div class="group-row"><section class="group"><h2 class="group-title">画面显示</h2><div class="toggle-list"><label class="toggle"><input id="showTrail" type="checkbox" checked>运动轨迹</label><label class="toggle"><input id="showDisplacement" type="checkbox" checked>位移箭头</label><label class="toggle"><input id="showComponents" type="checkbox" checked>位移分量</label><label class="toggle"><input id="showGrid" type="checkbox" checked>坐标网格</label></div></section>
<section class="group"><h2 class="group-title">实时数据</h2><div class="value-grid"><div class="value"><span>当前位置</span><strong id="positionText">(0.0, 0.0) m</strong></div><div class="value"><span>起点</span><strong id="startText">(0.0, 0.0) m</strong></div><div class="value"><span>x 位移</span><strong id="dxText">0.00 m</strong></div><div class="value"><span>y 位移</span><strong id="dyText">0.00 m</strong></div></div></section></div>
<section class="group"><h2 class="group-title">课堂观察</h2><div class="classroom"><button class="small-btn" data-demo="sameEnd">相同终点，不同路径</button><button class="small-btn" data-demo="closed">终点回到起点</button><button class="small-btn" id="setStartBtn">将当前位置设为起点</button></div></section>
</aside>
<section class="main panel"><div class="stage-head"><strong>x-y 坐标平面</strong><div class="legend"><span class="key"><i class="line-key"></i>路程轨迹</span><span class="key"><i class="arrow-key"></i>位移</span></div></div>
<div class="canvas-wrap"><canvas id="plane"></canvas><div class="badge" id="statusBadge">拖动小球记录运动</div></div>
<div class="transport"><div class="transport-buttons"><button class="icon-btn primary" id="playBtn" title="播放或暂停" aria-label="播放或暂停">▶</button><button class="icon-btn" id="resetBtn" title="回到路径起点" aria-label="回到路径起点">↺</button><button class="icon-btn" id="clearBtn" title="清除路径" aria-label="清除路径">×</button></div><input id="timeSlider" type="range" min="0" max="1" step="0.001" value="1" aria-label="运动进度"><div class="time" id="timeText">0.0 / 0.0 s</div></div>
<div class="concepts"><article class="concept"><h2 class="orange">路程 s = <span id="distanceFormula">0.00 m</span></h2><p>沿实际运动轨迹累加，是标量，与路径有关。</p></article><article class="concept"><h2 class="blue">位移 Δr = <span id="displacementFormula">(0.00, 0.00) m</span></h2><p>从起点指向终点，是矢量，只由起点和终点决定。</p></article></div></section>
</div></main>
<script>
const $=id=>document.getElementById(id),canvas=$('plane'),ctx=canvas.getContext('2d'),RANGE=10;
const fullscreenBtn=$('fullscreenBtn');fullscreenBtn.onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()};document.addEventListener('fullscreenchange',()=>{fullscreenBtn.textContent=document.fullscreenElement?'⛶ 退出全屏':'⛶ 全屏展示'});
const C={ink:'#17212b',muted:'#7b8996',grid:'#dbe4eb',axis:'#718291',orange:'#e16829',blue:'#246fe5',teal:'#087f78',start:'#1d9a62'};
const ui={distanceTop:$('distanceTop'),displacementTop:$('displacementTop'),positionText:$('positionText'),startText:$('startText'),dxText:$('dxText'),dyText:$('dyText'),distanceFormula:$('distanceFormula'),displacementFormula:$('displacementFormula'),playBtn:$('playBtn'),resetBtn:$('resetBtn'),clearBtn:$('clearBtn'),timeSlider:$('timeSlider'),timeText:$('timeText'),statusBadge:$('statusBadge'),setStartBtn:$('setStartBtn'),showTrail:$('showTrail'),showDisplacement:$('showDisplacement'),showComponents:$('showComponents'),showGrid:$('showGrid')};
let S={preset:'free',points:[{x:0,y:0,t:0}],progress:1,playing:false,dragging:false,dragStartedAt:0,lastFrame:0,duration:0};
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const fmt=(v,d=2)=>(Math.abs(v)<.0005?0:v).toFixed(d);
const dist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
function fit(){const r=canvas.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2),w=Math.max(300,Math.round(r.width)),h=Math.max(360,Math.round(r.height));if(canvas.width!==Math.round(w*d)||canvas.height!==Math.round(h*d)){canvas.width=Math.round(w*d);canvas.height=Math.round(h*d)}ctx.setTransform(d,0,0,d,0,0);return{width:w,height:h}}
function metrics(){const z=fit(),p=z.width<560?34:48,s=Math.min((z.width-p*2)/(RANGE*2),(z.height-p*2)/(RANGE*2));return{width:z.width,height:z.height,scale:s,ox:z.width/2,oy:z.height/2}}
function screen(p,m){return{x:m.ox+p.x*m.scale,y:m.oy-p.y*m.scale}}
function world(cx,cy,m){const r=canvas.getBoundingClientRect();return{x:clamp((cx-r.left-m.ox)/m.scale,-RANGE,RANGE),y:clamp((m.oy-(cy-r.top))/m.scale,-RANGE,RANGE)}}
function lengths(ps){const a=[0];for(let i=1;i<ps.length;i++)a.push(a[i-1]+dist(ps[i-1],ps[i]));return a}
function at(p){const ps=S.points;if(ps.length===1)return{point:ps[0],index:0};const target=clamp(p,0,1)*S.duration;let i=1;while(i<ps.length&&ps[i].t<target)i++;if(i>=ps.length)return{point:ps[ps.length-1],index:ps.length-1};const a=ps[i-1],b=ps[i],k=(target-a.t)/Math.max(.001,b.t-a.t);return{point:{x:a.x+(b.x-a.x)*k,y:a.y+(b.y-a.y)*k},index:i}}
function currentPath(){const q=at(S.progress);if(S.points.length===1)return{points:[S.points[0]],current:S.points[0]};const ps=S.points.slice(0,Math.max(1,q.index));ps.push(q.point);return{points:ps,current:q.point}}
function arrowHead(x,y,a,color,size){ctx.save();ctx.translate(x,y);ctx.rotate(a);ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-size,-size*.62);ctx.lineTo(-size,size*.62);ctx.closePath();ctx.fill();ctx.restore()}
function grid(m){ctx.clearRect(0,0,m.width,m.height);if(ui.showGrid.checked){ctx.strokeStyle=C.grid;ctx.lineWidth=1;for(let n=-RANGE;n<=RANGE;n++){let x=m.ox+n*m.scale,y=m.oy-n*m.scale;ctx.beginPath();ctx.moveTo(x,m.oy-RANGE*m.scale);ctx.lineTo(x,m.oy+RANGE*m.scale);ctx.stroke();ctx.beginPath();ctx.moveTo(m.ox-RANGE*m.scale,y);ctx.lineTo(m.ox+RANGE*m.scale,y);ctx.stroke()}}ctx.strokeStyle=C.axis;ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(m.ox-RANGE*m.scale,m.oy);ctx.lineTo(m.ox+RANGE*m.scale+10,m.oy);ctx.moveTo(m.ox,m.oy+RANGE*m.scale);ctx.lineTo(m.ox,m.oy-RANGE*m.scale-10);ctx.stroke();arrowHead(m.ox+RANGE*m.scale+10,m.oy,0,C.axis,7);arrowHead(m.ox,m.oy-RANGE*m.scale-10,-Math.PI/2,C.axis,7);ctx.fillStyle=C.ink;ctx.font='14px "Microsoft YaHei",Arial';ctx.textAlign='left';ctx.fillText('x / m',m.ox+RANGE*m.scale-28,m.oy-11);ctx.fillText('y / m',m.ox+10,m.oy-RANGE*m.scale+18);ctx.font='11px "Microsoft YaHei",Arial';ctx.fillStyle=C.muted;ctx.textAlign='center';ctx.textBaseline='top';[-10,-5,0,5,10].forEach(n=>ctx.fillText(String(n),m.ox+n*m.scale,m.oy+7));ctx.textAlign='right';ctx.textBaseline='middle';[-10,-5,5,10].forEach(n=>ctx.fillText(String(n),m.ox-7,m.oy-n*m.scale))}
function trail(ps,m){if(!ui.showTrail.checked||ps.length<2)return;ctx.save();ctx.strokeStyle=C.orange;ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ps.forEach((p,i)=>{p=screen(p,m);i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});ctx.stroke();ctx.restore()}
function displacement(a,b,m){if(!ui.showDisplacement.checked)return;const x=screen(a,m),y=screen(b,m),dx=y.x-x.x,dy=y.y-x.y,L=Math.hypot(dx,dy);if(L<3){ctx.save();ctx.strokeStyle=C.blue;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x.x,x.y,15,0,Math.PI*2);ctx.stroke();ctx.restore();return}ctx.save();ctx.strokeStyle=C.blue;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x.x,x.y);ctx.lineTo(y.x,y.y);ctx.stroke();arrowHead(y.x,y.y,Math.atan2(dy,dx),C.blue,11);ctx.restore();if(ui.showComponents.checked){ctx.save();ctx.setLineDash([6,5]);ctx.strokeStyle='rgba(36,111,229,.7)';ctx.lineWidth=1.7;ctx.beginPath();ctx.moveTo(x.x,x.y);ctx.lineTo(y.x,x.y);ctx.lineTo(y.x,y.y);ctx.stroke();ctx.setLineDash([]);ctx.font='12px "Microsoft YaHei",Arial';ctx.fillStyle=C.blue;ctx.textAlign='center';ctx.fillText('Δx',(x.x+y.x)/2,x.y+(dy>0?17:-9));ctx.textAlign='left';ctx.fillText('Δy',y.x+7,(x.y+y.y)/2);ctx.restore()}}
function marker(p,m,color,r,label){p=screen(p,m);ctx.save();ctx.fillStyle='#fff';ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.stroke();if(label){ctx.fillStyle=color;ctx.font='700 12px "Microsoft YaHei",Arial';ctx.textAlign='center';ctx.fillText(label,p.x,p.y-r-9)}ctx.restore()}
function ball(p,m){p=screen(p,m);ctx.save();ctx.shadowColor='rgba(8,127,120,.28)';ctx.shadowBlur=12;ctx.shadowOffsetY=4;ctx.fillStyle=C.teal;ctx.beginPath();ctx.arc(p.x,p.y,11,0,Math.PI*2);ctx.fill();ctx.shadowColor='transparent';ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x-3.5,p.y-3.5,2.5,0,Math.PI*2);ctx.fill();ctx.restore()}
function update(ps,p){const a=S.points[0];let path=0;for(let i=1;i<ps.length;i++)path+=dist(ps[i-1],ps[i]);const dx=p.x-a.x,dy=p.y-a.y,d=Math.hypot(dx,dy);ui.distanceTop.textContent=fmt(path)+' m';ui.displacementTop.textContent=fmt(d)+' m';ui.positionText.textContent='('+fmt(p.x,1)+', '+fmt(p.y,1)+') m';ui.startText.textContent='('+fmt(a.x,1)+', '+fmt(a.y,1)+') m';ui.dxText.textContent=fmt(dx)+' m';ui.dyText.textContent=fmt(dy)+' m';ui.distanceFormula.textContent=fmt(path)+' m';ui.displacementFormula.textContent='('+fmt(dx)+', '+fmt(dy)+') m';ui.timeText.textContent=fmt(S.progress*S.duration,1)+' / '+fmt(S.duration,1)+' s';ui.timeSlider.value=S.progress}
function render(){const m=metrics(),q=currentPath();grid(m);trail(q.points,m);displacement(S.points[0],q.current,m);marker(S.points[0],m,C.start,8,'起点');ball(q.current,m);update(q.points,q.current)}
function timed(ps,d=6){const a=lengths(ps),total=a[a.length-1]||1;return ps.map((p,i)=>({x:p.x,y:p.y,t:d*a[i]/total}))}
function segments(v,n=28){const ps=[];for(let i=1;i<v.length;i++){const a=v[i-1],b=v[i];for(let j=i===1?0:1;j<=n;j++){const k=j/n;ps.push({x:a.x+(b.x-a.x)*k,y:a.y+(b.y-a.y)*k})}}return ps}
const paths={straight:()=>segments([{x:-7,y:-4},{x:7,y:5}]),corner:()=>segments([{x:-7,y:-5},{x:-2,y:5},{x:7,y:3}]),circle:()=>Array.from({length:121},(_,i)=>{const a=Math.PI+i/120*Math.PI*2;return{x:5.5*Math.cos(a),y:5.5*Math.sin(a)}}),return:()=>segments([{x:-6,y:-4},{x:6,y:-4},{x:4,y:5},{x:-6,y:-4}])};
function active(name){S.preset=name;document.querySelectorAll('.preset').forEach(b=>b.classList.toggle('active',b.dataset.preset===name))}
function setPath(ps,d,name,auto=false){active(name);S.points=timed(ps,d);S.duration=d;S.progress=auto?0:1;S.playing=auto;S.dragging=false;S.lastFrame=0;ui.playBtn.textContent=auto?'Ⅱ':'▶';ui.statusBadge.textContent=name==='free'?'拖动小球记录运动':'预设路径';render();if(auto)requestAnimationFrame(tick)}
function preset(name){if(name==='free'){setPath([{x:0,y:0,t:0}],0,'free');return}setPath(paths[name](),name==='circle'?8:6,name,true)}
function down(e){if(S.preset!=='free'){const p=at(S.progress).point;setPath([{x:p.x,y:p.y,t:0}],0,'free')}S.playing=false;ui.playBtn.textContent='▶';S.dragging=true;S.dragStartedAt=performance.now();const p=world(e.clientX,e.clientY,metrics());S.points=[{x:p.x,y:p.y,t:0}];S.duration=0;S.progress=1;canvas.classList.add('dragging');canvas.setPointerCapture(e.pointerId);ui.statusBadge.textContent='正在记录';render()}
function move(e){if(!S.dragging)return;const p=world(e.clientX,e.clientY,metrics()),last=S.points[S.points.length-1];if(dist(last,p)<.035)return;const t=Math.min(60,(performance.now()-S.dragStartedAt)/1000);S.points.push({x:p.x,y:p.y,t});S.duration=t;S.progress=1;render()}
function up(e){if(!S.dragging)return;S.dragging=false;canvas.classList.remove('dragging');if(canvas.hasPointerCapture(e.pointerId))canvas.releasePointerCapture(e.pointerId);S.duration=Math.max(S.duration,.1);ui.statusBadge.textContent='记录完成';render()}
function tick(now){if(!S.playing)return;if(!S.lastFrame)S.lastFrame=now;const dt=(now-S.lastFrame)/1000;S.lastFrame=now;if(S.duration<=0){S.playing=false;ui.playBtn.textContent='▶';return}S.progress+=dt/S.duration;if(S.progress>=1){S.progress=1;S.playing=false;ui.playBtn.textContent='▶';ui.statusBadge.textContent='运动结束'}render();if(S.playing)requestAnimationFrame(tick)}
ui.playBtn.onclick=()=>{if(S.points.length<2||S.duration<=0)return;if(S.progress>=1)S.progress=0;S.playing=!S.playing;S.lastFrame=0;ui.playBtn.textContent=S.playing?'Ⅱ':'▶';ui.statusBadge.textContent=S.playing?'运动中':'已暂停';if(S.playing)requestAnimationFrame(tick);render()};
ui.resetBtn.onclick=()=>{S.playing=false;S.progress=0;S.lastFrame=0;ui.playBtn.textContent='▶';ui.statusBadge.textContent='回到起点';render()};
ui.clearBtn.onclick=()=>setPath([{x:0,y:0,t:0}],0,'free');
ui.timeSlider.oninput=e=>{S.playing=false;ui.playBtn.textContent='▶';S.progress=Number(e.target.value);ui.statusBadge.textContent='查看运动过程';render()};
ui.setStartBtn.onclick=()=>{const p=at(S.progress).point;setPath([{x:p.x,y:p.y,t:0}],0,'free');ui.statusBadge.textContent='已设置新起点'};
document.querySelectorAll('.preset').forEach(b=>b.onclick=()=>preset(b.dataset.preset));
document.querySelectorAll('[data-demo]').forEach(b=>b.onclick=()=>{if(b.dataset.demo==='sameEnd'){setPath(segments([{x:-7,y:-5},{x:-1,y:6},{x:7,y:4}]),7,'corner',true);ui.statusBadge.textContent='观察：终点相同，路程改变'}else{setPath(paths.return(),8,'return',true);ui.statusBadge.textContent='观察：回到起点时位移为零'}});
[ui.showTrail,ui.showDisplacement,ui.showComponents,ui.showGrid].forEach(x=>x.onchange=render);
canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);addEventListener('resize',render);render();
</script>
</body>
</html>
